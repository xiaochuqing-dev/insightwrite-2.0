version: "3.8"

services:
  mysql:
    image: mysql:8.0
    expose:
      - "3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in docker/.env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-insightwrite}
      MYSQL_USER: ${DB_USERNAME:?Set DB_USERNAME in docker/.env}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in docker/.env}
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    expose:
      - "8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-insightwrite}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:?Set DB_USERNAME in docker/.env}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in docker/.env}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in docker/.env}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:?Set DEEPSEEK_API_KEY in docker/.env}
      MAIL_USERNAME: ${MAIL_USERNAME:?Set MAIL_USERNAME in docker/.env}
      MAIL_PASSWORD: ${MAIL_PASSWORD:?Set MAIL_PASSWORD in docker/.env}
    depends_on:
      - mysql
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ../frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data:
